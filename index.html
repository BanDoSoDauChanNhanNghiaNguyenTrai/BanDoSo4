  <body>
    <header class="topbar" id="mainHeader">

      </div>

      <nav class="nav-menu">

      </div>

      <div id="sidebar-content">
        <div class="image-container">
          <button class="arrow-btn left-arrow" onclick="prevImage()">

      </div>

        <button id="closeVideo">✕</button>

      <div class="video-wrapper">
        <video id="consonVideo" controls>
          <source src="video/ConSonCa.mp4" type="video/mp4" />
        </video>
